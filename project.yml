name: SmartNote
options:
  bundleIdPrefix: com.skyc8266
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  SmartNote:
    type: application
    platform: macOS
    sources:
      - path: SmartNote/Sources
      - path: SmartNote/Resources
    preBuildScripts:
      - name: Copy Ciallo Web Files
        script: |
          echo "Copying ciallo web files to app bundle..."
          mkdir -p "$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Resources"
          cp -R "$SRCROOT/ciallo" "$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Resources/"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skyc8266.smartnote
        INFOPLIST_FILE: SmartNote/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SmartNote/Resources/SmartNote.entitlements
        PRODUCT_NAME: SmartNote
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.4.4"
        CURRENT_PROJECT_VERSION: "66"
    info:
      path: SmartNote/Resources/Info.plist
      properties:
        CFBundleName: SmartNote
        CFBundleDisplayName: 智学笔记
        CFBundleIdentifier: com.skyc8266.smartnote
        CFBundleVersion: "66"
        CFBundleShortVersionString: "1.4.4"
        CFBundlePackageType: APPL
        CFBundleExecutable: SmartNote
        LSMinimumSystemVersion: "13.0"
        LSApplicationCategoryType: public.app-category.education
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
    entitlements:
      path: SmartNote/Resources/SmartNote.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.personal-information.calendars: true
        com.apple.security.personal-information.reminders: true

schemes:
  SmartNote:
    build:
      targets:
        SmartNote: all
    run:
      config: Debug
    archive:
      config: Release
